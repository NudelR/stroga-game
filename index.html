<html>
<head>
<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>stroga-mobile</title>
<!-- write your code here -->
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="stroga-mobile.js?1778585450814"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("17EB1DA2CECC234DA8D91937EA18CA9D");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.strogamobile();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
</script>
<!-- write your code here -->
</head>
<body onload="init();" style="margin:0; overflow:hidden; touch-action:none; background:#000;">
	<div id="animation_container" style="
	position:fixed;
	width:100vw;
	height:100vh;
	left:0;
	top:0;
	overflow:hidden;
	background-color:rgba(153, 204, 255, 1.00);
">
		<canvas
	id="canvas"
	width="450"
	height="800"
	style="
		position:absolute;
		left:0;
		top:0;
		display:block;
		background-color:rgba(153, 204, 255, 1.00);
	">
</canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:450px; height:800px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
<!-- ===================== -->
<!-- UI OVERLAY -->
<!-- ===================== -->
<div id="uiOverlay" style="
    position:absolute;
    width:100vw;
    height:100vh;
    top:0;
    left:0;
    pointer-events:none;
">

    <!-- DARK BACKGROUND -->
    <div id="darkBg" style="
        position:absolute;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        display:none;
    "></div>

    <!-- INPUT BOX -->
    <div style="
        position:absolute;
        bottom:90px;
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:12px;
        pointer-events:auto;
    ">

        <!-- NAME -->
        <input
            id="nameInput"
            type="text"
            placeholder="Name"
            style="
                width:220px;
                padding:10px;
                font-size:16px;
                border-radius:10px;
                border:none;
                display:none;
            "
        />

        <!-- EMAIL -->
        <input
            id="emailInput"
            type="email"
            placeholder="E-Mail"
            style="
                width:220px;
                padding:10px;
                font-size:16px;
                border-radius:10px;
                border:none;
                display:none;
            "
        />

        <!-- ABSENDEN -->
        <button
            id="submitBtn"
            onclick="submitScore()"
            style="
                width:240px;
                padding:12px;
                font-size:16px;
                border:none;
                border-radius:12px;
                background:#ffcc00;
                font-weight:bold;
                display:none;
            "
        >
            Daten absenden
        </button>

        <!-- OHNE TEILNAHME -->
        <button
            id="skipBtn"
            onclick="skipScore()"
            style="
                width:240px;
                padding:12px;
                font-size:15px;
                border:none;
                border-radius:12px;
                background:#dddddd;
                display:none;
            "
        >
            Ohne Teilnahme fortfahren
        </button>

    </div>

</div>
</body>
</html>
